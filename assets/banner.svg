<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141b28"/>
      <stop offset="0.55" stop-color="#0b0e14"/>
      <stop offset="1" stop-color="#0b0e14"/>
    </linearGradient>
    <linearGradient id="conf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6f61"/>
      <stop offset="0.5" stop-color="#F0C35A"/>
      <stop offset="1" stop-color="#5FD787"/>
    </linearGradient>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5FD787"/>
    </marker>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <rect width="1280" height="440" fill="none"/>
  <circle cx="1150" cy="-40" r="240" fill="#5AC8F5" opacity="0.05"/>

  <!-- left: identity -->
  <g transform="translate(64,86)">
    <g transform="translate(0,0)">
      <circle cx="9" cy="9" r="9" fill="#5FD787"/>
      <circle cx="9" cy="9" r="9" fill="#5FD787" opacity="0.35"><animate attributeName="r" values="9;15;9" dur="3s" repeatCount="indefinite"/></circle>
      <text x="30" y="17" fill="#8b96a8" font-size="15" letter-spacing="3">QWEN CLOUD · MEMORYAGENT</text>
    </g>
    <text x="0" y="86" fill="#e6edf3" font-size="62" font-weight="800" letter-spacing="-1">Regress-Guard</text>
    <text x="2" y="132" fill="#5FD787" font-size="27" font-weight="600">A memory that forgets what's wrong.</text>
    <text x="2" y="170" fill="#8b96a8" font-size="18">Outcome-grounded, self-correcting memory for AI coding agents —</text>
    <text x="2" y="196" fill="#8b96a8" font-size="18">confidence earned from real test outcomes, not the model's opinion.</text>

    <!-- chips -->
    <g transform="translate(0,224)" font-family="ui-monospace, Menlo, monospace" font-size="13">
      <g><rect width="122" height="30" rx="8" fill="#171e2b" stroke="#232c3d"/><text x="61" y="20" fill="#5AC8F5" text-anchor="middle">Qwen · 3 roles</text></g>
      <g transform="translate(134,0)"><rect width="156" height="30" rx="8" fill="#171e2b" stroke="#232c3d"/><text x="78" y="20" fill="#e6edf3" text-anchor="middle">Alibaba Cloud ECS</text></g>
      <g transform="translate(302,0)"><rect width="196" height="30" rx="8" fill="#171e2b" stroke="#232c3d"/><text x="98" y="20" fill="#e6edf3" text-anchor="middle">FastAPI · SQLite · MCP</text></g>
      <g transform="translate(510,0)"><rect width="56" height="30" rx="8" fill="#171e2b" stroke="#232c3d"/><text x="28" y="20" fill="#5FD787" text-anchor="middle">MIT</text></g>
    </g>
  </g>

  <!-- right: the proof -->
  <g transform="translate(760,74)">
    <rect x="0" y="0" width="452" height="292" rx="16" fill="#101725" stroke="#232c3d"/>
    <text x="24" y="34" fill="#8b96a8" font-size="13" letter-spacing="2">THE PROOF — SAME TASK · TEMP 0 · HIDDEN TEST</text>

    <!-- red card -->
    <g transform="translate(24,52)">
      <rect width="182" height="96" rx="12" fill="#1a1010" stroke="#4d1e1e"/>
      <rect width="5" height="96" rx="12" fill="#ff6f61"/>
      <text x="20" y="30" fill="#8b96a8" font-size="12" font-family="ui-monospace,monospace">WITHOUT memory</text>
      <text x="20" y="62" fill="#ff6f61" font-size="24" font-weight="700" font-family="ui-monospace,monospace">TEST RED</text>
      <text x="20" y="84" fill="#8b96a8" font-size="13" font-family="ui-monospace,monospace">0 / 5 green</text>
    </g>
    <!-- arrow -->
    <line x1="214" y1="100" x2="244" y2="100" stroke="#5FD787" stroke-width="2.5" marker-end="url(#ar)"/>
    <!-- green card -->
    <g transform="translate(246,52)">
      <rect width="182" height="96" rx="12" fill="#0d1b12" stroke="#1e4d31"/>
      <rect width="5" height="96" rx="12" fill="#5FD787"/>
      <text x="20" y="30" fill="#8b96a8" font-size="12" font-family="ui-monospace,monospace">WITH memory</text>
      <text x="20" y="62" fill="#5FD787" font-size="24" font-weight="700" font-family="ui-monospace,monospace">TEST GREEN</text>
      <text x="20" y="84" fill="#8b96a8" font-size="13" font-family="ui-monospace,monospace">5 / 5 green</text>
    </g>

    <!-- confidence beta curve -->
    <text x="24" y="182" fill="#8b96a8" font-size="12" letter-spacing="1" font-family="ui-monospace,monospace">CONFIDENCE = Beta(α,β) from real pass/fail</text>
    <rect x="24" y="192" width="404" height="76" rx="10" fill="#0a0e16" stroke="#232c3d"/>
    <polyline points="34,262 90,260 150,255 210,244 260,226 300,202 336,222 360,240 388,252 418,258"
      fill="none" stroke="url(#conf)" stroke-width="3"/>
    <line x1="300" y1="196" x2="300" y2="264" stroke="#5FD787" stroke-dasharray="2 3" stroke-width="1" opacity="0.5"/>
    <text x="300" y="208" fill="#5FD787" font-size="11" text-anchor="middle" font-family="ui-monospace,monospace">peak = confident</text>
  </g>
</svg>
