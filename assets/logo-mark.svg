<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Regress-Guard">
  <defs>
    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- shield = guard / trust -->
  <path d="M32 5 54 13 V32 C54 45 44 54 32 59 C20 54 10 45 10 32 V13 Z"
        fill="none" stroke="url(#rg)" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- checkmark rising past the shield = a passing test / growing confidence -->
  <path d="M22 33 L29 41 L46 20" fill="none" stroke="url(#rg)"
        stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
