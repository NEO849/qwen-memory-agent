<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img"
     aria-label="Regress-Guard — memory for AI coding agents that forgets what's wrong">
  <defs>
    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" fill="#0b0f14"/>
  <line x1="80" y1="252" x2="1200" y2="252" stroke="#1f2937" stroke-width="2"/>

  <!-- mark -->
  <g transform="translate(92,86) scale(2.15)">
    <path d="M32 5 54 13 V32 C54 45 44 54 32 59 C20 54 10 45 10 32 V13 Z"
          fill="none" stroke="url(#rg)" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M22 33 L29 41 L46 20" fill="none" stroke="url(#rg)"
          stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="300" y="166" font-family="'Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="73" font-weight="700" fill="#e6edf3">Regress<tspan fill="#34d399">-Guard</tspan></text>
  <!-- tagline -->
  <text x="303" y="212" font-family="'Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="29" fill="#8b98a5">Memory for AI coding agents that forgets what&#8217;s wrong.</text>

  <!-- signature: the money shot, earned not asserted -->
  <text x="1180" y="152" text-anchor="end"
        font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="44" font-weight="700">
    <tspan fill="#4b5563">0/5</tspan><tspan fill="#8b98a5" dx="6">&#8594;</tspan><tspan fill="#34d399" dx="6">5/5</tspan>
  </text>
  <text x="1180" y="186" text-anchor="end"
        font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="18"
        fill="#8b98a5" letter-spacing="1">earned, not asserted</text>
</svg>
