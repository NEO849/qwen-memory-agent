<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Regress-Guard · memory graph</title>
  <style>
    :root { --bg:#090b11; --panel:rgba(14,20,30,.88); --line:rgba(120,150,190,.16);
      --ink:#e8edf4; --dim:#97a2b4; --faint:#596577; --green:#34d399; --red:#f87171;
      --amber:#F0C35A; --blue:#5AC8F5; --memory:#B9A6E8;
      --mono:ui-monospace,"SF Mono",Menlo,monospace; }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
      font:14px/1.5 "Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif; overflow:hidden; }
    #graph { position:fixed; inset:0; }
    .hud { position:fixed; z-index:10; background:var(--panel); backdrop-filter:blur(12px);
      border:1px solid var(--line); border-radius:10px; box-shadow:0 8px 40px rgba(0,0,0,.5); }
    #top { top:16px; left:16px; padding:13px 15px; max-width:280px; }
    #top .eyebrow { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:var(--faint); }
    #top h1 { margin:3px 0 2px; font-size:15px; font-weight:700; }
    #top .sub { color:var(--dim); font-size:11.5px; line-height:1.45; }
    #stats { display:flex; gap:14px; margin-top:11px; flex-wrap:wrap; }
    #stats div { line-height:1.05; }
    #stats b { display:block; font-family:var(--mono); font-size:16px; font-weight:700; color:var(--ink); }
    #stats span { font-family:var(--mono); font-size:9px; color:var(--faint); text-transform:uppercase; letter-spacing:.06em; }
    #stats .warn b { color:var(--red); } #stats .orph b { color:var(--amber); }
    #back { position:fixed; top:16px; right:16px; z-index:10; font-family:var(--mono); font-size:11px;
      text-transform:uppercase; letter-spacing:.08em; color:var(--dim); text-decoration:none;
      background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:7px 14px; }
    #back:hover { color:var(--ink); border-color:var(--blue); }
    #legend { bottom:16px; left:16px; padding:12px 15px; }
    #legend .grp { font-family:var(--mono); font-size:9px; text-transform:uppercase; letter-spacing:.1em; color:var(--faint); margin:0 0 6px; }
    #legend .grp+.grp { margin-top:11px; }
    #legend .row { display:flex; align-items:center; gap:9px; margin:4px 0; font-size:12px; color:var(--dim); }
    #legend .dot { width:11px; height:11px; border-radius:50%; flex:none; box-shadow:0 0 8px currentColor; }
    #legend .ln { width:16px; height:0; border-top:2px solid currentColor; flex:none; }
    #tip { position:fixed; z-index:20; pointer-events:none; display:none; max-width:300px;
      background:#0c1119; border:1px solid #2a3a4d; border-radius:10px; padding:9px 11px;
      font-size:12px; line-height:1.5; box-shadow:0 10px 30px rgba(0,0,0,.6); }
    #tip .t-rule { color:var(--ink); margin-bottom:5px; }
    #tip .t-meta { font-family:var(--mono); font-size:10.5px; color:var(--dim); }
    #tip .t-flag { display:inline-block; margin-top:5px; font-family:var(--mono); font-size:10px;
      border-radius:5px; padding:1px 6px; }
  </style>
</head>
<body>
  <div id="graph"></div>
  <a id="back" href="/">← back to the agent</a>
  <!-- info card + totals removed — the totals now live in the parent's horizontal metric strip;
       the graph fills the calmer, smaller column. Legend stays. -->
  <div id="legend" class="hud">
    <div class="grp">nodes</div>
    <div class="row"><span class="dot" style="color:#34d399">●</span>trusted (high confidence)</div>
    <div class="row"><span class="dot" style="color:#f87171">●</span>low confidence</div>
    <div class="row"><span class="dot" style="color:#c0392b">●</span>anti-pattern (do-not)</div>
    <div class="row"><span class="dot" style="color:#5a6577">●</span>obsolete (forgotten)</div>
    <div class="grp">edges</div>
    <div class="row"><span class="ln" style="color:#3a6ea5"></span>related</div>
    <div class="row"><span class="ln" style="color:#f87171"></span>supersedes</div>
    <div class="row"><span class="ln" style="color:#B9A6E8"></span>synthesizes</div>
  </div>
  <div id="tip"></div>
  <div id="timeline" class="hud" style="display:none; bottom:16px; left:50%; transform:translateX(-50%); padding:10px 15px; text-align:center">
    <div class="grp" style="font-family:var(--mono); font-size:11px; margin-bottom:7px">🕐 time-travel · <b id="tl-date">now</b></div>
    <input id="tl-range" type="range" min="0" max="0" value="0" step="1" style="width:190px; accent-color:#34d399; cursor:pointer">
  </div>

  <script>
    // embedded in the app's Graph tab? hide the redundant back-link (the tab toggle is the nav)
    if (window.self !== window.top) {
      const b = document.getElementById('back'); if (b) b.style.display = 'none';
      // the parent renders a compact legend BELOW the globe, so the in-canvas one would just cover nodes
      const lg = document.getElementById('legend'); if (lg) lg.style.display = 'none';
    }
  </script>
  <script src="/vendor/3d-force-graph.min.js"></script>
  <script>
    const EDGE = { related: 'rgba(90,140,200,.35)', supersedes: 'rgba(248,113,113,.7)', synthesizes: 'rgba(185,166,232,.7)' };
    const el = document.getElementById('graph');
    const tip = document.getElementById('tip');
    fetch('/graph').then(r => r.json()).then(g => {
      const data = { nodes: g.nodes, links: (g.edges || []).map(e => ({ ...e })) };
      const EDGE_BRIGHT = { related: '#5AC8F5', supersedes: '#f87171', synthesizes: '#B9A6E8' };
      const DIM_NODE = 'rgba(92,101,119,.20)', DIM_LINK = 'rgba(92,101,119,.05)';
      let selId = null, autoRot = true;
      const hlNodes = new Set(), hlLinks = new Set();
      const pulse = new Set();               // live recall pulse — separate from click-select
      let pulseTimer = null, lastPulse = [];
      const _id = e => (e && typeof e === 'object') ? e.id : e;
      function selectNode(n) {
        selId = n ? n.id : null;
        hlNodes.clear(); hlLinks.clear();
        if (n) {
          hlNodes.add(n.id);
          data.links.forEach(l => {
            const s = _id(l.source), t = _id(l.target);
            if (s === n.id || t === n.id) { hlLinks.add(l); hlNodes.add(s); hlNodes.add(t); }
          });
        }
        // force re-eval of the accessors
        G.nodeColor(G.nodeColor()).linkColor(G.linkColor()).linkWidth(G.linkWidth())
         .linkDirectionalParticles(G.linkDirectionalParticles());
        autoRot = !n;   // pause the idle spin while a node is focused
      }
      const G = ForceGraph3D()(el)
        .backgroundColor('#090b11')
        .graphData(data)
        .nodeVal(n => pulse.has(n.id) ? (n.val * 1.7) : n.val)
        .nodeColor(n => pulse.has(n.id) ? '#ffffff' : ((selId && !hlNodes.has(n.id)) ? DIM_NODE : n.color))
        .nodeOpacity(0.96)
        .nodeResolution(14)
        .linkColor(l => { const s = _id(l.source), t = _id(l.target);
          if (pulse.has(s) || pulse.has(t)) return EDGE_BRIGHT[l.type] || '#8ee3b0';
          return !selId ? (EDGE[l.type] || 'rgba(120,150,190,.3)') : (hlLinks.has(l) ? (EDGE_BRIGHT[l.type] || '#8ee3b0') : DIM_LINK); })
        .linkWidth(l => { const s = _id(l.source), t = _id(l.target);
          const base = Math.max(0.4, (l.weight || 1) * (l.type === 'related' ? 1.2 : 2));
          if (pulse.has(s) || pulse.has(t)) return base * 2.2;
          return selId ? (hlLinks.has(l) ? base * 2.4 : 0.25) : base; })
        .linkDirectionalParticles(l => { const s = _id(l.source), t = _id(l.target);
          if (pulse.has(s) || pulse.has(t)) return 6;
          return (selId && hlLinks.has(l)) ? 4 : (l.type === 'supersedes' ? 2 : 0); })
        .linkDirectionalParticleWidth(2.4)
        .onBackgroundClick(() => selectNode(null))
        .onNodeHover(n => {
          if (!n) { tip.style.display = 'none'; el.style.cursor = 'default'; return; }
          el.style.cursor = 'pointer';
          const flags = [];
          if (n.never_validated && !n.obsolete) flags.push(`<span class="t-flag" style="background:#1e1010;color:#f87171">no real test yet</span>`);
          if (n.orphan) flags.push(`<span class="t-flag" style="background:#1a1508;color:#F0C35A">orphan</span>`);
          if (n.kind === 'anti_pattern') flags.push(`<span class="t-flag" style="background:#1a0f0f;color:#e07b6f">⛔ do-not</span>`);
          tip.innerHTML = `<div class="t-rule">#${n.id} · ${n.desc || n.label}</div>` +
            `<div class="t-meta">confidence ${n.confidence} · ${n.severity} · ${n.real_pass}✓/${n.real_fail}✗ real · recalled ${n.recall_count}×</div>` +
            flags.join(' ');
          tip.style.display = 'block';
        })
        .onNodeClick(n => {
          selectNode(n);                       // colour the strands leaving this node
          // back the camera off proportionally to the node's radius so even the biggest hub fits
          const d = 80 + Math.cbrt(n.val || 1) * 46;
          const r = 1 + d / (Math.hypot(n.x, n.y, n.z) || 1);
          G.cameraPosition({ x: n.x * r, y: n.y * r, z: n.z * r }, n, 900);
        });
      // ---- live recall pulse: the parent app tells us which lessons were just recalled; those exact
      // nodes flare white + particles race their real edges, then fade. Honest: only real recall IDs. ----
      function reEval() {
        G.nodeColor(G.nodeColor()).nodeVal(G.nodeVal())
         .linkColor(G.linkColor()).linkWidth(G.linkWidth()).linkDirectionalParticles(G.linkDirectionalParticles());
      }
      function pulseNodes(ids) {
        const want = new Set((ids || []).map(Number));
        pulse.clear(); data.nodes.forEach(n => { if (want.has(Number(n.id))) pulse.add(n.id); });
        window.__pulseIds = [...pulse];        // observable for verification/debug (harmless)
        if (!pulse.size) return;
        reEval(); clearTimeout(pulseTimer);
        pulseTimer = setTimeout(() => { pulse.clear(); reEval(); }, 2800);
      }
      function refreshGraph() {                       // structure changed (taught/forgotten) — no camera reset
        fetch('/graph').then(r => r.json()).then(g => {
          data.nodes = g.nodes; data.links = (g.edges || []).map(e => ({ ...e })); G.graphData(data);
          if (lastPulse.length) pulseNodes(lastPulse);
        }).catch(() => {});
      }
      // ---- bi-temporal time-travel: scrub the whole knowledge base through its own history ----
      function applyAsOf(ts) {
        const url = ts ? '/graph?as_of=' + encodeURIComponent(ts) : '/graph';
        fetch(url).then(r => r.json()).then(g => {
          data.nodes = g.nodes; data.links = (g.edges || []).map(e => ({ ...e })); G.graphData(data);
        }).catch(() => {});
      }
      fetch('/timeline').then(r => r.json()).then(tl => {
        const inst = tl.instants || [];
        if (inst.length < 2) return;                  // not enough history to scrub
        const range = document.getElementById('tl-range');
        const dateEl = document.getElementById('tl-date');
        const panel = document.getElementById('timeline');
        if (panel) panel.style.display = 'block';
        range.max = inst.length; range.value = inst.length;   // rightmost = "now" (no as_of)
        range.addEventListener('input', () => {
          const i = Number(range.value);
          if (i >= inst.length) { dateEl.textContent = 'now'; applyAsOf(null); }
          else { dateEl.textContent = inst[i].slice(0, 10); applyAsOf(inst[i]); }
        });
      }).catch(() => {});
      window.addEventListener('message', (e) => {
        if (e.source !== window.parent) return;       // ignore anything but our host frame
        const m = e.data || {};
        if (m.type === 'recall-pulse' && Array.isArray(m.ids)) { lastPulse = m.ids; pulseNodes(m.ids); }
        else if (m.type === 'graph-refresh') refreshGraph();
      });
      addEventListener('mousemove', e => { tip.style.left = (e.clientX + 16) + 'px'; tip.style.top = (e.clientY + 14) + 'px'; });
      G.d3Force('charge').strength(-120);
      // centre + zoom the whole constellation to fill the frame once the force layout settles
      setTimeout(() => { try { G.zoomToFit(700, 60); } catch (_) {} }, 1300);
      // gentle idle auto-rotate (this build ships TrackballControls — no built-in autoRotate),
      // so orbit the camera around the centre ourselves; pause on interaction and while a node is focused.
      let ang = 0, radius = null, resumeAt = 0;
      const pause = () => { autoRot = false; resumeAt = performance.now() + 3500; };
      el.addEventListener('pointerdown', pause);
      el.addEventListener('wheel', pause, { passive: true });
      (function spin(t) {
        if (!selId && !autoRot && t >= resumeAt) autoRot = true;   // resume after the idle grace period
        if (autoRot && !selId) {
          const cam = G.cameraPosition();
          if (radius === null) radius = Math.hypot(cam.x, cam.z) || 340;
          ang += 0.0018;
          G.cameraPosition({ x: radius * Math.sin(ang), z: radius * Math.cos(ang) });  // keep current y
        } else if (radius !== null) {
          const cam = G.cameraPosition(); ang = Math.atan2(cam.x, cam.z); radius = Math.hypot(cam.x, cam.z);
        }
        requestAnimationFrame(spin);
      })(0);
    }).catch(() => { /* graph unavailable — the parent metric strip still shows the totals */ });
  </script>
</body>
</html>
